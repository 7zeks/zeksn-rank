<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecze - Kalkulator Szans</title>

    <link rel="icon" type="image/x-icon" href="ico.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<body>
    
    <main class="glass-panel">
    <div class="figma-h1-container">
        <h1>Szanse</h1>
    </div>

    <div class="figma-subtitle-container">
        <p class="subtitle">zk’ns analysis</p>
    </div>

    <div class="figma-row-container">
        <div class="figma-input-group gospodarze-width">
            <div class="label-margin">
                <label for="teamAInput">Gospodarze</label>
            </div>
            <div class="autocomplete-wrapper">
                <input type="text" id="teamAInput" placeholder="Wpisz nazwę..." autocomplete="off">
                <ul id="suggestionsA" class="suggestions-list hidden"></ul>
            </div>
        </div>

        <div class="vs-badge">VS</div>
    </div>

    <div class="figma-col-container">
        <div class="figma-input-group goscie-width">
            <div class="label-margin">
                <label for="teamBInput">Goście</label>
            </div>
            <div class="autocomplete-wrapper">
                <input type="text" id="teamBInput" placeholder="Wpisz nazwę..." autocomplete="off">
                <ul id="suggestionsB" class="suggestions-list hidden"></ul>
            </div>
        </div>
    </div>

    <div class="advanced-options">
            <label class="switch">
                <input type="checkbox" id="h2hSwitch" checked>
                <span class="slider"></span>
            </label>
            <span class="option-label">Uwzględnij historię H2H</span>
        </div>
    <button id="calculateBtn">Kalkuluj</button>

    <div id="results" class="results-panel hidden">
        <div class="matchup-names">
            <span id="nameA">Drużyna A</span>
            <span id="nameB">Drużyna B</span>
        </div>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="percentages">
            <span id="probA" class="color-a">50%</span>
            <span id="probB" class="color-b">50%</span>
        </div>

        <div class="analysis-details">
            <h3>Podstawa Typu (Średnie)</h3>
            <div class="stats-grid">
                <div class="stat-row">
                    <span id="statPossA" class="stat-val color-a">0%</span>
                    <span class="stat-label">Posiadanie piłki (40%)</span>
                    <span id="statPossB" class="stat-val color-b">0%</span>
                </div>
                <div class="stat-row">
                    <span id="statShotsA" class="stat-val color-a">0</span>
                    <span class="stat-label">Celne strzały (60%)</span>
                    <span id="statShotsB" class="stat-val color-b">0</span>
                </div>
            </div>
        </div>
    </div>
    </main>
